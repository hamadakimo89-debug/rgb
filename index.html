<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة باقات الموبايل</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background: #3182ce; color: white; border: none; cursor: pointer; }
        .item { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding: 10px 0; }
        .delete-btn { color: red; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-section" class="container">
        <h2>تسجيل الدخول</h2>
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="pass" placeholder="كلمة السر">
        <button onclick="login()">دخول</button>
        <button onclick="register()">حساب جديد</button>
    </div>

    <div id="app-section" class="container" style="display:none;">
        <h3>أهلاً بك!</h3>
        <button onclick="logout()">خروج</button>
        <hr>
        <input type="text" id="phone" placeholder="رقم الهاتف">
        <button onclick="saveData()">إضافة حجز</button>
        <div id="list"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB_GL73xVPwn_nqxOLUOMGS_UVJJKmew8M",
            authDomain: "ragb-phone.firebaseapp.com",
            projectId: "ragb-phone",
            storageBucket: "ragb-phone.firebasestorage.app",
            messagingSenderId: "896182366021",
            appId: "1:896182366021:web:c4580b74677e558052d82c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // مراقبة الدخول
        onAuthStateChanged(auth, (user) => {
            const authDiv = document.getElementById('auth-section');
            const appDiv = document.getElementById('app-section');
            if (user) {
                authDiv.style.display = 'none';
                appDiv.style.display = 'block';
                loadData(user.uid);
            } else {
                authDiv.style.display = 'block';
                appDiv.style.display = 'none';
            }
        });

        window.login = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value);
        window.register = () => createUserWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('pass').value);
        window.logout = () => signOut(auth);
        
        window.saveData = async () => {
            const val = document.getElementById('phone').value;
            if(val) {
                await addDoc(collection(db, "data"), { phone: val, uid: auth.currentUser.uid });
                document.getElementById('phone').value = '';
            }
        };

        // دالة الحذف الجديدة
        window.deleteItem = async (id) => {
            await deleteDoc(doc(db, "data", id));
        };

        function loadData(uid) {
            onSnapshot(query(collection(db, "data"), where("uid", "==", uid)), (snap) => {
                let html = '';
                snap.forEach(d => {
                    html += `
                    <div class="item">
                        <span>${d.data().phone}</span>
                        <span class="delete-btn" onclick="deleteItem('${d.id}')">× حذف</span>
                    </div>`;
                });
                document.getElementById('list').innerHTML = html;
            });
        }
    </script>
</body>
</html>
